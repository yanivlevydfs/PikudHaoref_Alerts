<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Rockets & Missles Alerts{% endblock %}</title>
    <!-- Google Fonts -->
    <link
        href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=Inter:wght@400;600&display=swap"
        rel="stylesheet">
    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
        integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <!-- Select2 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet" />
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/style.css?v=3">
    <!-- Favicon & PWA Icons -->
    <link rel="icon" type="image/png" href="/static/icon.png">
    <link rel="manifest" href="/manifest.json">
    <meta name="theme-color" content="#ff3b3b">
    <meta name="description"
        content="מערכת התרעות בזמן אמת עבור ירי רקטות וטילים בישראל. הישארו מעודכנים עם נתוני פיקוד העורף, מפות אינטראקטיביות וסטטיסטיקה.">
    <meta name="keywords" content="צבע אדום, התרעות, פיקוד העורף, רקטות, טילים, ביטחון, ישראל, מפת התרעות">
    <meta name="author" content="Yaniv Levy">

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://alerts.up.railway.app/">
    <meta property="og:title" content="התרעות ביטחוניות - מערכת התרעות בזמן אמת">
    <meta property="og:description" content="מערכת התרעות בזמן אמת עבור ירי רקטות וטילים בישראל.">
    <meta property="og:image" content="/static/icon.png">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:url" content="https://alerts.up.railway.app/">
    <meta property="twitter:title" content="התרעות ביטחוניות - מערכת התרעות בזמן אמת">
    <meta property="twitter:description" content="מערכת התרעות בזמן אמת עבור ירי רקטות וטילים בישראל.">
    <meta property="twitter:image" content="/static/icon.png">

    <!-- JSON-LD Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebApplication",
      "name": "התרעות ביטחוניות",
      "url": "https://alerts.up.railway.app/",
      "description": "Real-time security alerts system for Israel",
      "applicationCategory": "SafetyApplication",
      "operatingSystem": "All",
      "author": {
        "@type": "Person",
        "name": "Yaniv Levy"
      }
    }
    </script>

    {% block extra_head %}{% endblock %}
</head>

<body>
    <!-- Global Navigation Header -->
    <header class="site-header">
        <div class="header-logo">
            <a href="/">
                <span class="logo-icon">🛡️</span>
                <span class="logo-text">התראות ביטחוניות</span>
            </a>
        </div>
        <nav class="header-nav">
            <a href="/">ראשי</a>
            <a href="/archive">ארכיון</a>
            <a href="/stats">סטטיסטיקה</a>
            <a href="/about">אודות</a>
            <a href="/contact">צור קשר</a>
        </nav>
        <div class="header-clock" id="global-clock">
            <span class="clock-date" id="clock-date"></span>
            <span class="clock-time" id="clock-time">--:--:--</span>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <!-- Sleek Compact Footer Overlaid -->
    <footer class="site-footer">
        <nav class="footer-nav">
            <a href="/about">אודות</a>
            <a href="/contact">צור קשר</a>
            <a href="/terms">תנאי שימוש</a>
            <a href="/accessibility">נגישות</a>
            <a href="/privacy">הצהרת פרטיות</a>
            <a href="/sitemap">מפת אתר</a>
            <a href="/stats">סטטיסטיקה</a>
            <a href="/archive">ארכיון המלא</a>
        </nav>
        <div class="footer-copyright">
            &copy; <span id="currentYear"></span> התראות ביטחוניות
        </div>
    </footer>

    <!-- jQuery (Required for Select2) -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <!-- Select2 JS -->
    <script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

    <script>
        document.getElementById('currentYear').innerText = new Date().getFullYear();

        // Global Clock Logic
        function updateGlobalClock() {
            const now = new Date();

            // Format Time (HH:MM:SS)
            const timeStr = now.toLocaleTimeString('he-IL', { hour12: false });

            // Format Date (יום ראשון, 1 במרץ 2026)
            const dateStr = now.toLocaleDateString('he-IL', {
                weekday: 'long',
                day: 'numeric',
                month: 'long',
                year: 'numeric'
            });

            document.getElementById('clock-time').textContent = timeStr;
            document.getElementById('clock-date').textContent = dateStr;
        }

        // Initialize and tick every second
        setInterval(updateGlobalClock, 1000);
        updateGlobalClock();

        // PWA Service Worker Registration
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(reg => console.log('Service Worker registered!', reg))
                    .catch(err => console.log('Service Worker registration failed: ', err));
            });
        }
    </script>

    <!-- PWA Install Button -->
    <button id="pwa-install-btn" class="pwa-install-btn" style="display: none;">
        <span class="pwa-icon">📲</span>
        <span class="pwa-text">התקן אפליקציה</span>
    </button>

    {% block scripts %}
    {% endblock %}
</body>

</html>
