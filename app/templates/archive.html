{% extends "base.html" %}

{% block content %}
<div class="page-container glass-panel">
    <header class="page-header" style="text-align: center; margin-bottom: 2rem;">
        <h1 style="color: #ff3b3b; font-size: 2.5rem; text-shadow: 0 0 10px rgba(255, 59, 59, 0.3);">ארכיון התרעות</h1>
		<p class="subtitle" style="font-size: 1.2rem; color: var(--text-secondary);">היסטוריה מלאה של מערכת התרעות ביטחונית</p>
    </header>

    <div class="page-content archive-content" style="max-width: 800px; margin: 0 auto;">

        <div
            style="background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border-glass); border-radius: 12px; padding: 2rem;">
            <p style="text-align: center; color: var(--text-secondary); margin-bottom: 1.5rem;">
                כאן מוצגות כל ההתרעות שתועדו מאז הפעלת המערכת. הנתונים מתעדכנים בזמן אמת.
            </p>

            <div id="full-archive-list" style="display: flex; flex-direction: column; gap: 1rem;">
                <div style="text-align: center;">טוען נתונים מהארכיון...</div>
            </div>
        </div>

        <div style="margin-top: 2rem; text-align: center;">
            <a href="/" class="btn"
                style="display: inline-block; padding: 0.8rem 2rem; background: var(--accent-color); color: white; text-decoration: none; border-radius: 8px; font-weight: bold;">חזרה
                למערכת המרכזית</a>
        </div>
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', async () => {
        const listEl = document.getElementById('full-archive-list');

        try {
            // Fetch massive history - let's default to up to 72 hours for the full archive
            const res = await fetch('/api/alerts/history?hours=72');
            const json = await res.json();

            if (json.data && json.data.length > 0) {
                listEl.innerHTML = '';
                json.data.forEach(alert => {
                    const item = document.createElement('div');
                    item.style.background = 'rgba(0, 0, 0, 0.4)';
                    item.style.border = '1px solid var(--border-glass)';
                    item.style.borderRadius = '8px';
                    item.style.padding = '1rem';
                    item.style.display = 'flex';
                    item.style.justifyContent = 'space-between';
                    item.style.alignItems = 'center';

                    const timeStr = new Date(alert.timestamp).toLocaleString('he-IL');
                    const locationsStr = alert.locations.join(', ');

                    item.innerHTML = `
                    <div style="flex: 1; text-align: right; direction: rtl;">
                        <strong style="color: #ff3b3b; font-size: 1.1rem; display: block; margin-bottom: 0.3rem;">${alert.title}</strong>
                        <span style="color: var(--text-primary);">${locationsStr}</span>
                    </div>
                    <div style="background: rgba(255,255,255,0.1); padding: 0.5rem 1rem; border-radius: 6px; font-weight: bold; font-family: monospace;">
                        ${timeStr}
                    </div>
                `;
                    listEl.appendChild(item);
                });
            } else {
                listEl.innerHTML = '<div style="text-align: center; color: var(--safe-color);">אין רשומות בארכיון. שקט ושלווה!</div>';
            }
        } catch (e) {
            console.error(e);
            listEl.innerHTML = '<div style="text-align: center; color: #ff3b3b;">שגיאה בשליפת הנתונים. עיין בדחיפה לקבלת מידע נוסף.</div>';
        }
    });
</script>
{% endblock %}
