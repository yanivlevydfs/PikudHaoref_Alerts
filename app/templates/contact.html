{% extends "base.html" %}

{% block title %}צור קשר - Rockets & Missles Alerts{% endblock %}

{% block content %}
<div class="page-container glass-morphism text-center">
    <div class="contact-header">
        <div class="header-icon">
            <i class="fab fa-linkedin"></i>
        </div>
        <h1>צור קשר</h1>
        <p>הפרויקט והקוד הינם לשימוש חופשי, פותח באהבה בזמן מלחמת שאגת הארי ע"י יניב לוי.</p>

        <img src="/static/lionroar.webp" alt="מלחמת שאגת הארי"
            style="max-width: 250px; border-radius: 15px; margin: 1.5rem 0; box-shadow: 0 4px 15px rgba(0,0,0,0.3);">
    </div>

    <div class="contact-content">
        <a href="https://www.linkedin.com/in/yanivlevy/" target="_blank" class="linkedin-button">
            <i class="fab fa-linkedin"></i> Yaniv Levy
        </a>
    </div>
</div>

<style>
    .text-center {
        text-align: center;
    }

    .contact-header {
        margin-bottom: 2.5rem;
    }

    .header-icon {
        font-size: 3.5rem;
        color: #0077b5;
        /* LinkedIn Blue */
        margin-bottom: 1rem;
        filter: drop-shadow(0 0 10px rgba(0, 119, 181, 0.4));
    }

    .contact-content p {
        font-size: 1.1rem;
        color: var(--text-secondary);
        margin-bottom: 1.5rem;
    }

    .linkedin-button {
        display: inline-flex;
        align-items: center;
        gap: 0.8rem;
        background: #0077b5;
        color: white !important;
        padding: 0.8rem 2rem;
        border-radius: 30px;
        text-decoration: none;
        font-weight: 600;
        font-size: 1.1rem;
        transition: 0.3s;
        box-shadow: 0 4px 15px rgba(0, 119, 181, 0.3);
    }

    .linkedin-button:hover {
        background: #005a87;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 119, 181, 0.4);
    }
</style>
{% endblock %}
