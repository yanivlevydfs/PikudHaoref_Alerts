services:
  - type: web
    name: pikud-haoref-alerts
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: RAILWAY_ENVIRONMENT
        value: "true"
